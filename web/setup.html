<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Gateway — Setup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #09090b; --card: #111113; --border: #1e1e22;
    --text: #e5e5e5; --text2: #71717a; --accent: #6366f1;
    --err-bg: #450a0a; --err: #fb7185; --ok: #22c55e;
  }
  [data-theme="light"] {
    --bg: #f5f5f5; --card: #ffffff; --border: #e5e5e5;
    --text: #18181b; --text2: #71717a; --accent: #4f46e5;
    --err-bg: #fef2f2; --err: #dc2626; --ok: #16a34a;
  }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .setup-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .logo { text-align: center; margin-bottom: 1.5rem; }
  .logo .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .logo h1 { font-size: 1.2rem; font-weight: 700; }
  .logo h1 span { color: var(--accent); }
  .logo p { font-size: 0.8rem; color: var(--text2); margin-top: 0.3rem; line-height: 1.4; }

  .form-group { margin-bottom: 1rem; }
  label { display: block; font-size: 0.75rem; color: var(--text2); font-weight: 600; margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.05em; }
  input[type="password"] {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.7rem 1rem; color: var(--text);
    font-size: 0.9rem; outline: none; transition: border-color 0.15s;
  }
  input[type="password"]:focus { border-color: var(--accent); }
  .match-hint { font-size: 0.7rem; margin-top: 0.3rem; }
  .match-ok { color: var(--ok); }
  .match-err { color: var(--err); }

  .btn-setup {
    width: 100%; background: var(--accent); color: #fff; border: none;
    border-radius: 8px; padding: 0.75rem; font-size: 0.9rem; font-weight: 700;
    cursor: pointer; transition: opacity 0.15s; margin-top: 0.5rem;
  }
  .btn-setup:hover { opacity: 0.9; }
  .btn-setup:disabled { opacity: 0.5; cursor: not-allowed; }

  .error-msg {
    background: var(--err-bg); color: var(--err); border-radius: 6px;
    padding: 0.6rem 0.8rem; font-size: 0.8rem; margin-bottom: 1rem;
    display: none; text-align: center;
  }
  .error-msg.visible { display: block; }

  .theme-toggle {
    position: fixed; top: 1rem; right: 1rem;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.4rem 0.6rem; cursor: pointer;
    font-size: 1rem; color: var(--text);
  }
</style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">&#127769;</button>

  <div class="setup-card">
    <div class="logo">
      <div class="icon">&#128075;</div>
      <h1>Welcome to <span>LLM</span> Gateway</h1>
      <p>Create an admin password to secure your dashboard. You can reset it later with <code>--reset-password</code> flag.</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <form onsubmit="handleSetup(event)">
      <div class="form-group">
        <label>Admin Password</label>
        <input type="password" id="password" placeholder="Minimum 6 characters" autofocus required minlength="6" oninput="checkMatch()">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="passwordConfirm" placeholder="Re-enter password" required oninput="checkMatch()">
        <div class="match-hint" id="matchHint"></div>
      </div>
      <button type="submit" class="btn-setup" id="setupBtn">Create Password</button>
    </form>
  </div>

<script>
function getTheme() {
  return localStorage.getItem('llm-gw-theme') ||
    (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
}
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').innerHTML = t === 'dark' ? '&#127769;' : '&#9728;&#65039;';
}
function toggleTheme() {
  const t = getTheme() === 'dark' ? 'light' : 'dark';
  localStorage.setItem('llm-gw-theme', t);
  applyTheme(t);
}
applyTheme(getTheme());

function checkMatch() {
  const pw = document.getElementById('password').value;
  const confirm = document.getElementById('passwordConfirm').value;
  const hint = document.getElementById('matchHint');

  if (!confirm) { hint.textContent = ''; return; }
  if (pw === confirm) {
    hint.textContent = 'Passwords match';
    hint.className = 'match-hint match-ok';
  } else {
    hint.textContent = 'Passwords do not match';
    hint.className = 'match-hint match-err';
  }
}

async function handleSetup(e) {
  e.preventDefault();
  const btn = document.getElementById('setupBtn');
  const errEl = document.getElementById('errorMsg');
  const pw = document.getElementById('password').value;
  const confirm = document.getElementById('passwordConfirm').value;

  if (pw !== confirm) {
    errEl.textContent = 'Passwords do not match';
    errEl.classList.add('visible');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating...';
  errEl.classList.remove('visible');

  try {
    const res = await fetch('/admin/setup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password: pw, password_confirm: confirm}),
    });
    const data = await res.json();

    if (data.ok) {
      window.location.href = data.redirect || '/admin/login';
      return;
    }

    errEl.textContent = data.error || 'Setup failed';
    errEl.classList.add('visible');
  } catch (err) {
    errEl.textContent = 'Connection error';
    errEl.classList.add('visible');
  }

  btn.disabled = false;
  btn.textContent = 'Create Password';
}
</script>
</body>
</html>
